<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Price-Action Scan</title>
<style>
 :root{--bg:#0d1117;--panel:#161b22;--bd:#30363d;--fg:#e6edf3;--mut:#8b949e;
   --grn:#3fb950;--red:#f85149;--accent:#58a6ff;--warn:#d29922}
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--fg);
   font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
 header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;
   flex-wrap:wrap;align-items:baseline;gap:8px 18px}
 h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px}
 .meta{color:var(--mut);font-size:12px}
 .bar{padding:12px 20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
   border-bottom:1px solid var(--bd)}
 .bar input,.bar select{background:var(--panel);border:1px solid var(--bd);color:var(--fg);
   padding:6px 10px;border-radius:6px;font:inherit}
 .bar input{min-width:160px}
 button{background:var(--panel);border:1px solid var(--bd);color:var(--fg);
   padding:6px 12px;border-radius:6px;cursor:pointer;font:inherit}
 button:hover{border-color:var(--accent)}
 button.on{background:var(--accent);color:#0d1117;border-color:var(--accent)}
 .spacer{flex:1}
 .banner{padding:8px 20px;background:#3b2e0a;color:var(--warn);
   border-bottom:1px solid var(--bd);font-size:12px;display:none}
 table{width:100%;border-collapse:collapse}
 th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap}
 th{position:sticky;top:0;background:var(--panel);cursor:pointer;color:var(--mut);
   font-weight:600;user-select:none}
 th:hover{color:var(--fg)}
 td.num{text-align:right;font-variant-numeric:tabular-nums}
 tr:hover td{background:#1c2230}
 .tag{padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600}
 .s1{background:#1f6feb33;color:#79c0ff} .s2{background:#a371f733;color:#d2a8ff}
 .long{color:var(--grn)} .short{color:var(--red)}
 .bullish{color:var(--grn)} .bearish{color:var(--red)} .neutral{color:var(--mut)}
 .src{color:var(--mut);font-size:10px;text-transform:uppercase}
 .dc-D{color:#79c0ff} .dc-C{color:#d2a8ff}
 .score{font-weight:600}
 a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
 .state{padding:40px 20px;color:var(--mut)}
</style></head><body>
<header>
  <h1>PRICE-ACTION SCAN</h1>
  <span class="meta" id="gen">loading…</span>
  <span class="meta" id="counts"></span>
</header>
<div class="banner" id="banner"></div>
<div class="bar">
  <select id="snap" title="snapshot"></select>
  <input id="q" placeholder="filter ticker…">
  <button data-f="all" class="on">All</button>
  <button data-f="S1">S1 reversal</button>
  <button data-f="S2">S2 breakout</button>
  <button data-f="long">Long</button>
  <button data-f="short">Short</button>
  <span class="spacer"></span>
  <button id="reload">↻ Reload</button>
  <button id="csv">Export CSV</button>
</div>
<table id="t"><thead><tr>
  <th data-k="ticker">Ticker</th>
  <th data-k="signal">Sig</th>
  <th data-k="side">Side</th>
  <th data-k="score" class="num">Score</th>
  <th data-k="last" class="num">Last</th>
  <th data-k="level" class="num">Level</th>
  <th data-k="dist" class="num">Dist/Brk(ATR)</th>
  <th data-k="detail">Detail</th>
  <th data-k="volx" class="num">Vol&times;</th>
  <th data-k="atr" class="num">ATR</th>
  <th data-k="regime">Regime</th>
  <th data-k="vol_state">Vol</th>
  <th data-k="structure">Structure</th>
  <th>Trend</th>
  <th>Chart</th>
</tr></thead><tbody id="b"></tbody></table>
<div id="state" class="state">Loading…</div>
<script>
const $ = s => document.querySelector(s);
let ROWS = [], view = [], sortK = "score", sortDir = -1, filt = "all", q = "";

function spark(closes, side){
  if(!closes || closes.length < 2) return "";
  const w=110,h=28,pad=2, lo=Math.min(...closes), hi=Math.max(...closes), rng=(hi-lo)||1;
  const step=(w-2*pad)/(closes.length-1);
  const pts=closes.map((c,i)=>`${(pad+i*step).toFixed(1)},${(pad+(h-2*pad)*(1-(c-lo)/rng)).toFixed(1)}`).join(" ");
  const color=side==="long"?"#3fb950":"#f85149";
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="${color}" stroke-width="1.4" points="${pts}"/></svg>`;
}
const REG={bullish:'Bull',bearish:'Bear',neutral:'Neut'};
function regCell(r){
  if(!r.regime) return "";
  return `<span class="${r.regime}">${REG[r.regime]||r.regime}</span> <span class="src">ADX ${r.regime_adx??''}</span>`;
}
function volTitle(r){
  const f=[];
  if(r.ivr!=null) f.push("IVR "+r.ivr);
  if(r.iv!=null) f.push("IV "+r.iv);
  if(r.rv!=null) f.push("RV "+r.rv);
  if(r.vrp!=null) f.push("VRP "+(r.vrp>0?"+":"")+r.vrp);
  if(r.term!=null) f.push("term "+(r.term>0?"+":"")+r.term);
  return f.join(" · ") || "no IV data";
}
function volCell(r){
  if(!r.vol_state) return "";
  return `${r.vol_state} <span class="src">${r.vol_src||''}</span>`;
}
function structCell(r){
  if(!r.structure) return "";
  const m=String(r.structure).match(/\((\w)\)$/), dc=m?m[1]:'';
  return `<span class="dc-${dc}">${r.structure}</span>`;
}
function passes(r){
  if(q && !r.ticker.toLowerCase().includes(q)) return false;
  if(filt==="all") return true;
  if(filt==="S1"||filt==="S2") return r.signal===filt;
  return r.side===filt;
}
function render(){
  view = ROWS.filter(passes).sort((a,b)=>{
    let x=a[sortK], y=b[sortK];
    const xn=parseFloat(x), yn=parseFloat(y);
    if(!isNaN(xn)&&!isNaN(yn)) return (xn-yn)*sortDir;
    return String(x).localeCompare(String(y))*sortDir;
  });
  const tb=$("#b"); tb.innerHTML="";
  for(const r of view){
    const tr=document.createElement("tr");
    tr.innerHTML=
      `<td><b>${r.ticker}</b></td>`+
      `<td><span class="tag ${String(r.signal).toLowerCase()}">${r.signal}</span></td>`+
      `<td class="${r.side}">${r.side}</td>`+
      `<td class="num score">${Number(r.score).toFixed(3)}</td>`+
      `<td class="num">${r.last??""}</td>`+
      `<td class="num">${r.level??""}</td>`+
      `<td class="num">${r.dist??""}</td>`+
      `<td>${r.detail??""}</td>`+
      `<td class="num">${r.volx??""}</td>`+
      `<td class="num">${r.atr??""}</td>`+
      `<td>${regCell(r)}</td>`+
      `<td title="${volTitle(r)}">${volCell(r)}</td>`+
      `<td>${structCell(r)}</td>`+
      `<td>${spark(r.spark, r.side)}</td>`+
      `<td><a href="https://www.tradingview.com/chart/?symbol=${encodeURIComponent(r.ticker)}" target="_blank">TV</a></td>`;
    tb.appendChild(tr);
  }
  $("#state").style.display = ROWS.length ? "none" : "block";
}
function applyData(d){
  ROWS = d.rows || [];
  $("#gen").textContent = d.generated ? "updated " + d.generated.replace("T"," ").replace("Z"," UTC") : "";
  $("#counts").textContent = `universe ${d.universe??"?"} · liquid ${d.scanned??"?"} · signals ${d.count??ROWS.length}`;
  const b=$("#banner");
  if(d.note){ b.textContent = d.note; b.style.display="block"; } else { b.style.display="none"; }
  $("#state").textContent = ROWS.length ? "" : "No signals in this snapshot.";
  render();
}
async function load(name){
  try{
    const r = await fetch(`data/${name}.json?t=${Date.now()}`);
    if(!r.ok) throw new Error(r.status);
    applyData(await r.json());
  }catch(e){
    $("#state").textContent = "No scan data yet — the first run will populate this. ("+e+")";
    $("#state").style.display="block";
  }
}
async function initSnaps(){
  try{
    const r = await fetch(`data/index.json?t=${Date.now()}`);
    if(!r.ok) return;
    const idx = await r.json();
    const sel=$("#snap");
    (idx.snapshots||[]).forEach((d,i)=>{
      const o=document.createElement("option");
      o.value=d; o.textContent=(i===0? d+"  (latest)": d); sel.appendChild(o);
    });
    sel.onchange=()=>load(sel.value);
  }catch(e){}
}
document.querySelectorAll("th[data-k]").forEach(th=>th.onclick=()=>{
  const k=th.dataset.k;
  if(sortK===k) sortDir*=-1; else {sortK=k; sortDir=(k==="ticker"||k==="detail"||k==="side")?1:-1;}
  render();
});
document.querySelectorAll(".bar button[data-f]").forEach(btn=>btn.onclick=()=>{
  filt=btn.dataset.f;
  document.querySelectorAll(".bar button[data-f]").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on"); render();
});
$("#q").oninput=e=>{q=e.target.value.trim().toLowerCase(); render();};
$("#reload").onclick=()=>{ const s=$("#snap"); load(s.value||"latest"); };
$("#csv").onclick=()=>{
  const cols=["ticker","signal","side","score","last","level","dist","detail","volx","atr",
              "regime","regime_adx","vol_state","vol_src","cell","structure",
              "ivr","iv","rv","vrp","term","label"];
  const head=cols.join(",");
  const lines=view.map(r=>cols.map(c=>{
    let v=r[c]; if(v==null) v=""; v=String(v).replace(/"/g,'""');
    return /[",\n]/.test(v)? '"'+v+'"': v;
  }).join(","));
  const blob=new Blob([head+"\n"+lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="pa_scan.csv"; a.click();
};
(async()=>{ await initSnaps(); await load("latest"); })();
</script></body></html>
