name: scan

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/data/**"
  schedule:
    # 22:30 UTC on weekdays — after the US cash close (handles EST/EDT).
    # GitHub may delay scheduled runs under load; trigger manually if needed.
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the rebase-before-push works

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify FVS pattern integration
        run: python -m unittest tests.test_pattern_integration tests.test_chart_history -v

      - name: Run scans -> JSON snapshots (US options + ASX/India directional)
        run: |
          python -m pa_scanner.cli --market us  --web docs --no-html
          python -m pa_scanner.cli --market asx --web docs --no-html
          python -m pa_scanner.cli --market in  --web docs --no-html

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "scan: snapshot $(date -u +%Y-%m-%d_%H:%MZ)"
          # the user pushes from their PC constantly; replay onto the moved remote
          git pull --rebase -X theirs --no-edit
          git push
