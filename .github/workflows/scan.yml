name: scan

on:
  schedule:
    # 22:30 UTC on weekdays — after the US cash close (handles EST/EDT).
    # GitHub may delay scheduled runs under load; trigger manually if needed.
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scan -> JSON snapshot
        run: python -m pa_scanner.cli --web docs --no-html

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git diff --staged --quiet || git commit -m "scan: snapshot $(date -u +%Y-%m-%d_%H:%MZ)"
          git push
